# ─────────────────────────────────────────────────
# Squid Egress Proxy — Crypto Vault Whitelist
# Only allows traffic to approved DeFi/Web3 domains
# ─────────────────────────────────────────────────

# Listen on standard port
http_port 3128

# ── Access control ──
acl localnet src 172.30.0.0/24           # Only vault container
acl SSL_ports port 443
acl Safe_ports port 80 443
acl CONNECT method CONNECT

# Domain whitelist (loaded from file)
acl whitelist dstdomain "/etc/squid/whitelist.txt"

# Local CRX server on the vault container (for extension force-install)
acl vault_crx dst 172.30.0.10

# ── Rules ──
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# ALLOW local CRX server (extension installs)
http_access allow localnet vault_crx

# ALLOW only whitelisted domains from vault network
http_access allow localnet whitelist

# DENY everything else
http_access deny all

# ── Logging (minimal, no PII) ──
access_log stdio:/var/log/squid/access.log
cache_log /dev/null

# ── Performance ──
cache deny all                  # No caching — we want fresh DeFi data
dns_nameservers 1.1.1.1 8.8.8.8
forwarded_for delete            # Don't leak internal IPs
via off
