# ─────────────────────────────────────────────────
# Squid Egress Proxy — Crypto Vault Whitelist
# Only allows traffic to approved DeFi/Web3 domains.
# ─────────────────────────────────────────────────

# Listen on standard port
http_port 3128

# ── ACLs ──
acl localnet   src 172.30.0.0/24           # Only vault container
acl SSL_ports  port 443                     # HTTPS only
acl Safe_ports port 80 443                  # HTTP + HTTPS (no FTP, telnet, etc.)
acl CONNECT    method CONNECT

# Domain whitelist (loaded from file)
acl whitelist  dstdomain "/etc/squid/whitelist.txt"

# Local CRX server on the vault container (for extension installs)
acl vault_crx  dst 172.30.0.10

# ── Rules ──
http_access deny !Safe_ports                # Block unsafe ports
http_access deny CONNECT !SSL_ports         # CONNECT tunnels only to 443 (no FTP, no telnet)

http_access allow localnet vault_crx        # Allow local CRX server (extension installs)
http_access allow localnet whitelist        # Allow whitelisted domains from vault
http_access deny all                        # Block everything else

# ── Logging (denials + requests to stdout for debugging) ──
access_log stdio:/var/log/squid/access.log
cache_log  /var/log/squid/cache.log

# ── Performance ──
cache deny all                              # No caching — fresh DeFi data
dns_nameservers 1.1.1.1 8.8.8.8

# ── Privacy ──
forwarded_for off                           # Don't leak internal IPs
via off                                     # Don't advertise Squid in responses
httpd_suppress_version_string on            # Hide Squid version in error pages
