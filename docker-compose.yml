##############################################################
# Crypto Vault — Isolated browser + Web3 CLI tools
#
# Usage:
#   ./vault-x11.sh                       # Launch Chrome (X11)
#   docker compose --profile vault run --rm crypto-vault bash   # Shell
#
# The crypto-vault service uses `profiles: ["vault"]` so it only
# starts when explicitly requested (via profile or vault-x11.sh).
# The egress-proxy has no profile and always runs in the background.
#
# Architecture:
#   crypto-vault ──▶ egress-proxy ──▶ internet (whitelist only)
#       (internal network, no direct internet)
##############################################################

services:
  # ── Crypto Vault: Chrome + Web3 tools (profile-gated, ephemeral) ──
  crypto-vault:
    profiles: ["vault"]
    build: .
    image: crypto-safe-container:latest
    networks:
      vault-internal:
        ipv4_address: 172.30.0.10
    dns:
      - 172.30.0.2
    volumes:
      - chrome-profile:/home/vault/.config/google-chrome
      - vault-downloads:/home/vault/Downloads
      - vault-projects:/home/vault/projects
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
    environment:
      - DISPLAY=${DISPLAY:-:0}
    extra_hosts:
      # For macOS XQuartz — host.docker.internal resolves to the host
      - "host.docker.internal:host-gateway"
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    shm_size: 512m
    depends_on:
      egress-proxy:
        condition: service_healthy

  # ── Egress Proxy: Whitelist-only internet access ──
  egress-proxy:
    image: ubuntu/squid:latest
    container_name: vault-egress-proxy
    hostname: egress-proxy

    cap_drop: [ALL]
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true

    networks:
      vault-internal:
        ipv4_address: 172.30.0.2
      vault-external: {}

    volumes:
      - ./squid/squid.conf:/etc/squid/squid.conf:ro
      - ./squid/whitelist.txt:/etc/squid/whitelist.txt:ro

    healthcheck:
      # Squid listens on port 3128 (0x0C38 in /proc/net/tcp*).
      # Using /proc since ubuntu/squid has no curl/wget/nc/squidclient.
      test: ["CMD", "sh", "-c", "grep -qE ':0C38 .*:.* 0A ' /proc/net/tcp /proc/net/tcp6 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

    restart: unless-stopped

networks:
  # Internal network: NO direct internet — containers must use proxy
  vault-internal:
    name: vault-internal
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.0.0/24

  # External network: proxy's internet uplink
  vault-external:
    name: vault-external
    driver: bridge

volumes:
  chrome-profile:
    name: crypto-vault-chrome
  vault-downloads:
    name: crypto-vault-downloads
  vault-projects:
    name: crypto-vault-projects
