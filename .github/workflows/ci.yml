name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly rebuild to pick up base image security patches
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  build:
    name: Build Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build crypto-vault image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: crypto-safe-container:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Foundry installed
        run: |
          docker run --rm crypto-safe-container:ci forge --version
          docker run --rm crypto-safe-container:ci cast --version
          docker run --rm crypto-safe-container:ci anvil --version

      - name: Verify Node.js + npm
        run: |
          docker run --rm crypto-safe-container:ci node --version
          docker run --rm crypto-safe-container:ci npm --version

      - name: Verify Chromium installed
        run: |
          docker run --rm crypto-safe-container:ci chromium --version

      - name: Verify Chrome policy file exists
        run: |
          docker run --rm crypto-safe-container:ci \
            test -f /etc/opt/chrome/policies/managed/policies.json

      - name: Verify welcome page shipped
        run: |
          docker run --rm crypto-safe-container:ci \
            test -f /opt/chrome-extensions/welcome.html

      - name: Verify npm ignore-scripts default
        run: |
          docker run --rm crypto-safe-container:ci \
            grep -q "ignore-scripts=true" /etc/npmrc

      - name: Verify non-root user
        run: |
          uid=$(docker run --rm crypto-safe-container:ci id -u)
          test "$uid" = "1000" || (echo "expected UID 1000, got $uid"; exit 1)

  smoke-test:
    name: Proxy Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run smoketest
        run: ./scripts/smoketest.sh

      - name: Dump proxy logs on failure
        if: failure()
        run: docker compose logs egress-proxy

      - name: Cleanup
        if: always()
        run: docker compose down -v

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: crypto-safe-container:scan

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: crypto-safe-container:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0   # Don't fail on vulns in base image

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Scan Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      - name: Validate docker-compose.yml
        run: docker compose config --quiet
