name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly rebuild to pick up base image security patches
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  build:
    name: Build Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build crypto-vault image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: crypto-safe-container:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Foundry installed
        run: |
          docker run --rm crypto-safe-container:ci forge --version
          docker run --rm crypto-safe-container:ci cast --version
          docker run --rm crypto-safe-container:ci anvil --version

      - name: Verify Node.js + npm
        run: |
          docker run --rm crypto-safe-container:ci node --version
          docker run --rm crypto-safe-container:ci npm --version

      - name: Verify Chrome policies
        run: |
          docker run --rm crypto-safe-container:ci \
            cat /etc/opt/chrome/policies/managed/policies.json | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert len(d['ExtensionInstallForcelist'])==3, 'Expected 3 extensions'"

      - name: Verify npm ignore-scripts default
        run: |
          docker run --rm crypto-safe-container:ci \
            grep -q "ignore-scripts=true" /etc/npmrc

  compose-test:
    name: Compose Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: echo "VAULT_PASSWORD=ci-test-password" > .env

      - name: Start services
        run: docker compose up -d --build --wait --wait-timeout 120

      - name: Check containers running
        run: |
          docker compose ps
          docker compose ps --format json | python3 -c "
          import sys, json
          services = [json.loads(line) for line in sys.stdin]
          for s in services:
              assert s['State'] == 'running', f'{s[\"Name\"]} not running: {s[\"State\"]}'
          print(f'✅ All {len(services)} services running')
          "

      - name: Test proxy allows whitelisted domain
        run: |
          docker exec crypto-vault curl -sf \
            --proxy http://172.30.0.2:3128 \
            --max-time 15 \
            -o /dev/null -w "%{http_code}" \
            https://etherscan.io | grep -q "200\|301\|302"
          echo "✅ Whitelisted domain: OK"

      - name: Test proxy blocks non-whitelisted domain
        run: |
          STATUS=$(docker exec crypto-vault curl -sf \
            --proxy http://172.30.0.2:3128 \
            --max-time 10 \
            -o /dev/null -w "%{http_code}" \
            https://evil.com 2>/dev/null || echo "blocked")
          echo "Response: $STATUS"
          [[ "$STATUS" == "blocked" || "$STATUS" == "403" ]]
          echo "✅ Non-whitelisted domain: BLOCKED"

      - name: Test vault has no direct internet (bypassing proxy)
        run: |
          docker exec crypto-vault curl -sf \
            --max-time 5 \
            https://google.com 2>/dev/null && exit 1 || true
          echo "✅ Direct internet: BLOCKED"

      - name: Cleanup
        if: always()
        run: docker compose down -v

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: crypto-safe-container:scan

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: crypto-safe-container:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0   # Don't fail on vulns in base image

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Scan Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      - name: Validate docker-compose.yml
        run: docker compose config --quiet
